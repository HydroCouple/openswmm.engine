benchmark: infil-horton-constant-rainfall
type: manufactured
description: >
  Horton infiltration under constant rainfall intensity large enough to keep
  the soil permanently ponded (capacity-limited throughout). Reference values
  are computed directly from the Horton closed-form equations using the same
  parameters as the HortonInfil test group in test_infiltration.cpp.
swmm_target: src/engine/hydrology/Infiltration.cpp

problem:
  name: horton-constant-rainfall-ponded
  equation:
    rate:       "f(t)  = f_min + (f0 - f_min) * exp(-k * t)"
    cumulative: "F(t)  = f_min*t + (f0 - f_min)/k * (1 - exp(-k*t))"
  scenario: rainfall = 5 in/hr throughout (exceeds f0 = 3 in/hr; fully ponded)

parameters:
  f0_in_per_hr: 3.0
  fmin_in_per_hr: 0.5
  k_per_hr: 4.0
  f0_ft_per_s: 6.94444444e-05    # 3.0 / 12 / 3600
  fmin_ft_per_s: 1.15740741e-05  # 0.5 / 12 / 3600
  k_per_s: 1.11111111e-03        # 4.0 / 3600
  unit_note: >
    Engine stores rates in ft/s and depths in ft.
    Conversion: 1 in/hr = 1/(12*3600) ft/s; 1 in = 1/12 ft.

dataset:
  file: reference.csv
  columns:
    t_s:         time in seconds
    t_hr:        time in hours
    f_ft_per_s:  infiltration rate in ft/s
    F_ft:        cumulative infiltration depth in ft
    f_in_per_hr: infiltration rate in in/hr
    F_in:        cumulative infiltration depth in inches
  n_points: 7
  t_values_s: [0, 900, 1800, 2700, 3600, 7200, 14400]
  t_values_hr: [0.0, 0.25, 0.50, 0.75, 1.0, 2.0, 4.0]

tolerances:
  f_max_absolute_ft_per_s: 1.0e-8
  F_max_absolute_ft: 1.0e-7
  basis: >
    Closed-form Horton evaluation in double precision is exact to machine
    epsilon. If the implementation uses an ODE step internally, loosen to
    1e-6 ft/s and 1e-5 ft.

provenance:
  generated_by: analytic formula evaluated in double-precision arithmetic
  tool: none (closed-form)
  date: "2026-05-03"
  author: openswmm.engine development team
  computation: >
    f_ft_per_s[i] = fmin_ft_per_s + (f0_ft_per_s - fmin_ft_per_s) * exp(-k_per_s * t_s[i]);
    F_ft[i]       = fmin_ft_per_s * t_s[i] + (f0_ft_per_s - fmin_ft_per_s) / k_per_s
                      * (1.0 - exp(-k_per_s * t_s[i]));
  reproducible: true
  notes: >
    Parameters match HortonInfil tests in tests/unit/engine/test_infiltration.cpp.
    No Flash-X or external tool generation was used.

attribution:
  statement: >
    Manufactured benchmark based on the standard Horton (1940) infiltration equation.
  citation: >
    Horton, R.E. (1940). An approach toward a physical interpretation of
    infiltration-capacity. Soil Science Society of America Proceedings, 5, 399-417.
  license_note: benchmark data are original to this project; no copied source code.

benchmark: odesolve-sir-epidemic
type: cross-code-validation
description: >
  Three-variable nonlinear SIR ODE system integrated by both SWMM's C++
  Cash-Karp RK45 and Flash-X's Fortran Cash-Karp RK45, providing cross-code
  verification of the multi-variable ODE integration path.  The primary tests
  (conservation, phase-plane, qualitative dynamics) run without a reference CSV.
  The trajectory comparison test requires the CSV to be populated by Flash-X.
swmm_target: src/engine/math/OdeSolver.cpp

problem:
  name: sir-epidemic
  equations:
    - "dS/dt = -beta * S * I / N"
    - "dI/dt =  beta * S * I / N  -  gamma * I"
    - "dR/dt =  gamma * I"
  initial_conditions:
    S0: 0.99
    I0: 0.01
    R0_init: 0.0
    N: 1.0
  parameters:
    beta_per_s: 0.3
    gamma_per_s: 0.1
    R0_basic: 3.0     # beta / gamma
    t_start_s: 0.0
    t_end_s: 60.0

exact_invariants:
  conservation: "S(t) + I(t) + R(t) = N = 1  for all t"
  phase_plane:  "S(t) = S0 * exp(-R0_basic * R(t))"

tolerances:
  conservation: 1.0e-10
  phase_plane: 1.0e-4
  trajectory_S: 1.0e-3   # requires populated reference.csv
  trajectory_I: 1.0e-3
  trajectory_R: 1.0e-3

dataset:
  file: reference.csv
  status: placeholder   # only t=0 row present; populate using generation script below
  columns:
    t_s: time in seconds
    S: susceptible fraction
    I: infected fraction
    R: recovered fraction
  planned_t_eval_s: [0, 10, 20, 30, 40, 50, 60]

attribution:
  references:
    sir_model: >
      Kermack, W.O. and McKendrick, A.G. (1927). A contribution to the
      mathematical theory of epidemics. Proceedings of the Royal Society of
      London, Series A, 115(772), 700-721.
      https://doi.org/10.1098/rspa.1927.0118
    integrator: >
      Cash, J.R. and Karp, A.H. (1990). A variable order Runge-Kutta method
      for initial value problems with rapidly varying right-hand sides.
      ACM Transactions on Mathematical Software, 16(3), 201-222.
      https://doi.org/10.1145/79505.79507
  flash_x_module: source/numericalTools/RungeKutta/RungeKuttaMain/RungeKutta_step.F90
  flash_x_method: CashKarp45 (rk_setButcherTableauRepository.F90)
  controller_note: >
    Flash-X and SWMM use the same Cash-Karp tableau but different step-size
    controllers. Flash-X uses externally supplied eFrac*eBase error bounds;
    SWMM scales by |y| + |h*f| + tiny. Both are correct adaptive RK45
    implementations. The cross-validation compares sampled solution values
    at common output times, not internal step sequences.
  license_note: benchmark data are original to this project; no Flash-X source copied.

provenance:
  date: "2026-05-07"
  author: openswmm.engine development team
  status: placeholder — trajectory rows require Flash-X run or Python fallback
  reproducible: true

generation_script: |
  #!/usr/bin/env python3
  # tools/generate_sir_reference.py
  # Generates reference.csv using scipy RK45 at tight tolerance.
  # Run from the repository root.

  import numpy as np
  from scipy.integrate import solve_ivp
  import csv, pathlib

  beta, gamma, N = 0.3, 0.1, 1.0
  y0 = [0.99, 0.01, 0.0]
  t_eval = [0, 10, 20, 30, 40, 50, 60]

  def sir(t, y):
      force = beta * y[0] * y[1] / N
      return [-force, force - gamma * y[1], gamma * y[1]]

  sol = solve_ivp(sir, [0, 60], y0, method='RK45',
                  t_eval=t_eval, rtol=1e-12, atol=1e-14, dense_output=False)

  out = pathlib.Path('tests/benchmarks/manufactured/odesolve-sir-epidemic/reference.csv')
  with out.open('w', newline='') as f:
      f.write('# SIR epidemic reference trajectory\n')
      f.write('# Generated by: scipy.integrate.solve_ivp RK45 rtol=1e-12 atol=1e-14\n')
      f.write('# Parameters: beta=0.3/s, gamma=0.1/s, N=1, S(0)=0.99, I(0)=0.01, R(0)=0\n')
      f.write('# Columns: t_s, S, I, R\n')
      w = csv.writer(f)
      w.writerow(['t_s', 'S', 'I', 'R'])
      for i, t in enumerate(sol.t):
          w.writerow([f'{t:.1f}',
                      f'{sol.y[0,i]:.15f}',
                      f'{sol.y[1,i]:.15f}',
                      f'{sol.y[2,i]:.15f}'])

  print('Wrote', out)
  # Verify invariant
  assert all(abs(sol.y[0,i]+sol.y[1,i]+sol.y[2,i]-N) < 1e-12 for i in range(len(sol.t)))
  print('Conservation invariant OK')
